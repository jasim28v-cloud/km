<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VΞLΘX | PREMIUM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@300;700&display=swap');
        :root { --neon: #bf00ff; --cyan: #00f3ff; --dark: #05010a; }
        
        body { margin: 0; background: var(--dark); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; height: 100vh; user-select: none; }
        
        .v-scroller { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .v-scroller::-webkit-scrollbar { display: none; }
        
        .v-frame { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* الشعار العلوي الأنيق الثابت */
        .fixed-header {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            padding: 25px; text-align: center;
            background: linear-gradient(to bottom, rgba(5,1,10,0.9) 0%, transparent 100%);
            pointer-events: none;
        }
        .main-logo-text {
            font-family: 'Orbitron'; font-weight: 900; font-size: 32px;
            letter-spacing: 8px; color: #fff;
            text-shadow: 0 0 10px var(--neon), 0 0 20px var(--neon);
            display: inline-block;
        }
        .main-logo-text span { color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }

        /* العلامة المائية داخل الفيديو */
        .internal-watermark {
            position: absolute; bottom: 120px; left: 20px;
            font-family: 'Orbitron'; font-weight: 900; font-size: 14px;
            color: rgba(255,255,255,0.3); letter-spacing: 3px;
            padding: 5px 12px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px); pointer-events: none;
            z-index: 50;
        }

        /* أزرار التفاعل الجانبية */
        .side-interface { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .action-circle { 
            width: 55px; height: 55px; background: rgba(255,255,255,0.05); 
            backdrop-filter: blur(15px); border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; cursor: pointer; transition: 0.3s;
        }
        .action-circle:active { transform: scale(0.9); border-color: var(--cyan); }
        .count-tag { font-size: 10px; font-weight: bold; text-align: center; margin-top: 4px; font-family: 'Orbitron'; color: rgba(255,255,255,0.6); }

        /* الناف بار السفلي */
        .bottom-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; height: 70px;
            background: rgba(255,255,255,0.03); backdrop-filter: blur(30px);
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-btn { font-size: 20px; color: rgba(255,255,255,0.3); }
        .nav-btn.active { color: #fff; text-shadow: 0 0 10px #fff; }
        .upload-center { width: 50px; height: 38px; background: var(--cyan); color: #000; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

    <header class="fixed-header">
        <div class="main-logo-text">VΞL<span>Θ</span>X</div>
    </header>

    <main class="v-scroller" id="video-feed"></main>

    <nav class="bottom-nav">
        <i class="fas fa-home nav-btn active"></i>
        <i class="fas fa-search nav-btn"></i>
        <div class="upload-center" id="upload-trigger"><i class="fas fa-plus"></i></div>
        <i class="fas fa-comment-alt nav-btn"></i>
        <i class="fas fa-user nav-btn"></i>
    </nav>

    <script>
        const firebaseConfig = { databaseURL: "https://forg-c693e-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('videos').on('value', snap => {
            const feed = document.getElementById('video-feed');
            const data = snap.val(); if(!data) return;
            feed.innerHTML = '';
            Object.keys(data).reverse().forEach(id => {
                const section = document.createElement('section');
                section.className = 'v-frame';
                section.innerHTML = `
                    <div class="internal-watermark">VΞLΘX OFFICIAL</div>
                    <video loop playsinline src="${data[id].url}"></video>
                    <div class="side-interface">
                        <div onclick="likeVideo('${id}')">
                            <div class="action-circle"><i class="fas fa-heart text-red-500"></i></div>
                            <div class="count-tag" id="likes-${id}">${data[id].likes || 0}</div>
                        </div>
                        <div class="action-circle"><i class="fas fa-share text-white"></i></div>
                    </div>
                `;
                feed.appendChild(section);
            });
            initObserver();
        });

        function likeVideo(id) {
            db.ref(`videos/${id}/likes`).transaction(c => (c || 0) + 1);
            if(window.navigator.vibrate) window.navigator.vibrate(50);
        }

        const uploader = cloudinary.createUploadWidget({ cloudName: "dfscughol", uploadPreset: "update_vk" }, (e, r) => {
            if (r.event === "success") db.ref('videos').push({ url: r.info.secure_url, likes: 0 });
        });
        document.getElementById('upload-trigger').onclick = () => uploader.open();

        function initObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    e.isIntersecting ? v.play().catch(()=>{}) : v.pause();
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.v-frame').forEach(f => obs.observe(f));
        }

        document.addEventListener('touchstart', () => { 
            document.querySelectorAll('video').forEach(v => v.muted = false); 
        }, {once:true});
    </script>
</body>
</html>
