<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VΞLΘX | AUDIO CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@200;700&display=swap');
        :root { --neon: #bf00ff; --cyan: #00f3ff; --deep-purple: #050010; }
        
        body { margin: 0; background: var(--deep-purple); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; height: 100vh; }
        
        .v-scroller { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .v-scroller::-webkit-scrollbar { display: none; }
        
        .v-frame { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* واجهة الغرفة الصوتية */
        #audio-room {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 40%;
            background: rgba(10, 1, 24, 0.95); backdrop-filter: blur(30px);
            border-top: 2px solid var(--cyan); border-radius: 40px 40px 0 0;
            z-index: 4000; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center; padding: 30px;
        }
        #audio-room.active { bottom: 0; }

        /* نبضات الصوت البصرية */
        .voice-wave {
            display: flex; gap: 5px; height: 40px; align-items: center; margin: 20px 0;
        }
        .wave-bar { width: 4px; background: var(--cyan); border-radius: 2px; animation: wave 1s infinite ease-in-out; }
        @keyframes wave { 0%, 100% { height: 10px; } 50% { height: 40px; } }

        .mic-btn {
            width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.1);
            border: 2px solid var(--cyan); display: flex; align-items: center; justify-content: center;
            font-size: 30px; cursor: pointer; transition: 0.3s;
        }
        .mic-btn.on { background: var(--cyan); color: #000; box-shadow: 0 0 30px var(--cyan); }

        .side-interface { position: absolute; right: 20px; bottom: 130px; display: flex; flex-direction: column; gap: 25px; z-index: 100; }
        .action-node { width: 55px; height: 55px; background: rgba(0,0,0,0.5); border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

    <main class="v-scroller" id="feed-container"></main>

    <div id="audio-room">
        <div class="w-16 h-1 bg-white/20 rounded-full mb-6"></div>
        <h3 class="font-[Orbitron] text-[var(--cyan)] tracking-widest text-sm">AUDIO_CORE // LIVE</h3>
        
        <div class="voice-wave" id="visualizer" style="display: none;">
            <div class="wave-bar" style="animation-delay: 0.1s"></div>
            <div class="wave-bar" style="animation-delay: 0.3s"></div>
            <div class="wave-bar" style="animation-delay: 0.5s"></div>
            <div class="wave-bar" style="animation-delay: 0.2s"></div>
            <div class="wave-bar" style="animation-delay: 0.4s"></div>
        </div>

        <div class="flex gap-10 mt-6 items-center">
            <div class="mic-btn" id="mic-trigger" onclick="toggleMic()">
                <i class="fas fa-microphone-slash" id="mic-icon"></i>
            </div>
        </div>
        
        <p class="mt-6 text-[10px] opacity-40 uppercase tracking-[4px]">Press to transmit signal</p>
        <button onclick="closeAudio()" class="mt-auto text-xs opacity-60 underline">Disconnect</button>
    </div>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[85%] h-16 bg-white/5 backdrop-blur-2xl border border-white/10 rounded-full flex justify-around items-center z-[2000]">
        <i class="fas fa-home opacity-40"></i>
        <div class="w-12 h-10 bg-white text-black rounded-xl flex items-center justify-center"><i class="fas fa-plus"></i></div>
        <i class="fas fa-headset text-[var(--cyan)]" onclick="openAudio()"></i>
    </nav>

    <script>
        const firebaseConfig = { databaseURL: "https://forg-c693e-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('videos').on('value', s => {
            const feed = document.getElementById('feed-container');
            const data = s.val(); if(!data) return;
            feed.innerHTML = '';
            Object.keys(data).reverse().forEach(id => {
                const sec = document.createElement('section');
                sec.className = 'v-frame';
                sec.innerHTML = `
                    <video loop playsinline src="${data[id].url}"></video>
                    <div class="side-interface">
                        <div class="action-node" onclick="openAudio()"><i class="fas fa-tower-broadcast text-[var(--cyan)]"></i></div>
                        <div class="action-node"><i class="fas fa-heart text-red-500"></i></div>
                        <div class="action-node"><i class="fas fa-comment-dots text-white"></i></div>
                    </div>
                `;
                feed.appendChild(sec);
            });
            initObs();
        });

        let isMicOn = false;
        function openAudio() { document.getElementById('audio-room').classList.add('active'); }
        function closeAudio() { 
            document.getElementById('audio-room').classList.remove('active');
            if(isMicOn) toggleMic();
        }

        function toggleMic() {
            isMicOn = !isMicOn;
            const btn = document.getElementById('mic-trigger');
            const icon = document.getElementById('mic-icon');
            const vis = document.getElementById('visualizer');

            if(isMicOn) {
                btn.classList.add('on');
                icon.className = 'fas fa-microphone';
                vis.style.display = 'flex';
                // هنا يتم ربط الـ Audio Stream مستقبلاً
            } else {
                btn.classList.remove('on');
                icon.className = 'fas fa-microphone-slash';
                vis.style.display = 'none';
            }
        }

        function initObs() {
            const obs = new IntersectionObserver(es => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    e.isIntersecting ? v.play() : v.pause();
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.v-frame').forEach(f => obs.observe(f));
        }

        document.addEventListener('touchstart', () => { 
            document.querySelectorAll('video').forEach(v => v.muted = false); 
        }, {once:true});
    </script>
</body>
</html>
